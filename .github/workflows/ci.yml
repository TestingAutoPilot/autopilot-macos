name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Build
        run: swift build

      - name: Build TestHostApp fixture
        run: Fixtures/TestHostApp/make-app.sh

      - name: Test
        run: swift test

  lint-plans:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      # Lint any example plans committed in the repo (none yet by default).
      - name: Lint plans (if any)
        run: |
          if [ -d uitests ]; then
            .build/debug/autopilot lint uitests || true
          fi
